  japan_agitators.1.t: "Venera al Emperador, expulsa a los Bárbaros"
  japan_agitators.1.d: "Un samurai de baja categoría, Saigo Takamori, ha sido promocionado recientemente por Shimazu Nariakira, daimio del dominio de Satsuma. Bajo la protección de su patrón, Saigo ha comenzado a promover una ideología reformiste bajo el eslogan de Sonnō jōi. ¿Cómo debebemos proceder con él?"
  japan_agitators.1.f: "Saigō Takamori (born Jan. 23, 1828, Kagoshima, Kyushu, Japan—died Sept. 24, 1877, Kagoshima) was a leader in the overthrow of the Tokugawa shogunate who later rebelled against the weaknesses he saw in the Imperial government that he had helped to restore. Although his participation in the restoration made him a legendary hero, it also, to his mortification, relegated his samurai class to impotence. - Encyclopedia Britannica. "
  japan_agitators.1.a: "Dejémosle estar, no podemos perder el apoyo de los Shimazu."
  japan_agitators.1.b: "¡Alta traición! Ejecutémosle ahora mismo."

