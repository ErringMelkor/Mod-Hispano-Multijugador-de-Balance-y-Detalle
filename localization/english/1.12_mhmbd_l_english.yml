  japan_agitators.1.t: "Revere the Emperor, expel the Barbarians"
  japan_agitators.1.d: "A dashing and popular, low-ranking samurai, Saigo Takamori has been recently promoted by Shimazu Nariakira, daimyo of Satsuma domain. Under protection of his powerful patron, Saigo has begun to spout a reformist ideology under the slogan of Sonnō jōi. Many are listening to him, and the whispers even reach the ears of the shogunal court at Edo. How should we proceed with him?"
  japan_agitators.1.f: "Saigō Takamori (born Jan. 23, 1828, Kagoshima, Kyushu, Japan—died Sept. 24, 1877, Kagoshima) was a leader in the overthrow of the Tokugawa shogunate who later rebelled against the weaknesses he saw in the Imperial government that he had helped to restore. Although his participation in the restoration made him a legendary hero, it also, to his mortification, relegated his samurai class to impotence. - Encyclopedia Britannica. "
  japan_agitators.1.a: "Let him be, we can't risk losing the support of the Shimazu."
  japan_agitators.1.b: "This is treason! Execute him immediately."

