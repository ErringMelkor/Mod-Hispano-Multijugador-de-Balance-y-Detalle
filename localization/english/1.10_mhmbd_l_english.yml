law_sosloviia: "Sosloviia"
law_sosloviia_desc: "A neo-feudalist social system that intermixes a rigid yet undefined model with priviledges to specific classes."

law_ispravniks: "Ispravniks"
law_ispravniks_desc: "While in theory two separate branches, local nobility controls the administration of the provinces, with heavy priviledges and abuses as a de-facto reality."

law_zemstvos: "Zemstvos"
law_zemstvos_desc: "Hybrid rule of local governance where aristocrats are still at the top of the assemblies, but the rights of the peasantry and the urban dwellers and fortified against their worst excesses."

law_gymnazii: "Gymnazii"
law_gymnazii_desc: "System of military schools open to most people, designed to obtein loyal soldiers and officials for the Russian army, all the while keeping marginal groups and peasants from receiving literate instructions."

law_multipolar_serfdom: "Multipolar Serfdom"
law_multipolar_serfdom_desc: "Dual serfdom system, where half of the peasantry belongs to the State and the other to the aristocracy. While the State serfs are theoretically speaking free tenants, this is frecuently overriden by local aristocracy."

law_obshchina: "Obshchina"
law_obshchina_desc: "System of land ownership where private servitude still persists, but State serfs can now functionally operate as free tenants."

