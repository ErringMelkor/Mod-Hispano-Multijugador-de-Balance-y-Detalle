je_age_of_nicholas_i: "The Age of Nicholas I"
je_age_of_nicholas_i_reason: "The Napoleonic Wars have risen [ROOT.GetCountry.GetName] as a Great Power in the Western world. The Tzar, [SCOPE.sCharacter('nicholas_i_scope').GetFullName], succeeded his brother Alexander I in 1825. Without abandoning the absolutist policy of his older brother, [SCOPE.sCharacter('nicholas_i_scope').GetFullName] focuses on internal stability, military supremacy and territorial expansion. \n\n#b The Agenda of Nicholas I:#!\nAchieving his objectives will improve both his current effectiveness as a Tzar as well as his Legacy once he passes the torch of the Russian goverment.\n• [SCOPE.GetRootScope.GetCountry.GetCustom('nicholas_i_art_checkbox')] [ROOT.GetCountry.GetNameNoFlag] leads the production of [GetGoods('fine_art').GetName|l].\n• [SCOPE.GetRootScope.GetCountry.GetCustom('nicholas_i_tech_checkbox')] [ROOT.GetCountry.GetNameNoFlag] has researched [GetPlayer.MakeScope.ScriptValue('nicholas_i_tech_target')|v0] [Concept('concept_technology', '$concept_technologies$')|l] (actualmente [GetPlayer.MakeScope.ScriptValue('techs_researched_script')|v0]).\n• [SCOPE.GetRootScope.GetCountry.GetCustom('nicholas_i_movement_checkbox')] All [Concept('concept_political_movement','$concept_political_movements$')|l] of #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt liberal#! or #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt socialista#! have support #b marginal#!.\n• [SCOPE.GetRootScope.GetCountry.GetCustom('nicholas_i_balkans_checkbox')] [ROOT.GetCountry.GetNameNoFlag] owns all [concept_state_region|l] of [GetStateRegion('STATE_BESSARABIA').GetName], [GetStateRegion('STATE_MOLDAVIA').GetName], [GetStateRegion('STATE_WALLACHIA').GetName] and [GetStateRegion('STATE_DOBRUDJA').GetName]. \n• [SCOPE.GetRootScope.GetCountry.GetCustom('nicholas_i_eastern_anatolia_checkbox')] [ROOT.GetCountry.GetNameNoFlag] owns all [concept_state_region|l] of [GetStateRegion('STATE_GREATER_CAUCASUS').GetName], [GetStateRegion('STATE_KARS').GetName], [GetStateRegion('STATE_ERZURUM').GetName] and [GetStateRegion('STATE_TRABZON').GetName]. \n• [SCOPE.GetRootScope.GetCountry.GetCustom('nicholas_i_manchuria_checkbox')] [ROOT.GetCountry.GetNameNoFlag] owns all [concept_state_region|l] of [GetStateRegion('STATE_AMUR').GetName], [GetStateRegion('STATE_OUTER_MANCHURIA').GetName], [GetStateRegion('STATE_NORTHERN_MANCHURIA').GetName] and [GetStateRegion('STATE_SOUTHERN_MANCHURIA').GetName]. \n• [SCOPE.GetRootScope.GetCountry.GetCustom('nicholas_i_manchuria_checkbox')] [ROOT.GetCountry.GetNameNoFlag] owns all [concept_state_region|l] of [GetStateRegion('STATE_AZERBAIJAN').GetName], [GetStateRegion('STATE_TABRIZ').GetName], [GetStateRegion('STATE_URMIA').GetName] and [GetStateRegion('STATE_MAZANDARAN').GetName]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('nicholas_i_institutions_checkbox')] [ROOT.GetCountry.GetNameNoFlag] has Police and Internal Security at levels 3 and 2 respectively. \n• [SCOPE.GetRootScope.GetCountry.GetCustom('nicholas_i_legitimacy_checkbox')][ROOT.GetCountry.GetNameNoFlag] has 90 or higher Goverment Legitimacy. \n•[SCOPE.GetRootScope.GetCountry.GetCustom('nicholas_i_military_checkbox')] [ROOT.GetCountry.GetNameNoFlag] has a land power projection superior to [GetPlayer.MakeScope.ScriptValue('nicholas_i_military_target')|v0]."

