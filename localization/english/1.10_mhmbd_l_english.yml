je_age_of_alexander_ii: "The Age of Alexander II"
je_age_of_alexander_ii_reason: "Distant from the militaristic of his father, Alexander II wishes to industrialize and modernize Russia without abandoning divine rule. \n\n#b The Agenda of Alexander II:#!\n Achieving his objectives will improve both his current effectiveness as a Tzar as well as his Legacy once he passes the torch of the Russian goverment.\n• [ROOT.GetCountry.GetNameNoFlag] will increase its bonus by leading the production on Industrial Goods, Grain and Liquor, and to a lesser extent with the rest.\n• [SCOPE.GetRootScope.GetCountry.GetCustom('alexander_ii_debt_checkbox')] National debt [ROOT.GetCountry.GetNameNoFlag] does not surpass half its credit.\n• [SCOPE.GetRootScope.GetCountry.GetCustom('alexander_ii_industralists_checkbox')] [ROOT.GetCountry.GetNameNoFlag] has Powerful Industrialists. \n• [SCOPE.GetRootScope.GetCountry.GetCustom('alexander_ii_commercialized_checkbox')] [ROOT.GetCountry.GetNameNoFlag] has Commercialized Agriculture. \n• [SCOPE.GetRootScope.GetCountry.GetCustom('alexander_ii_conscription_checkbox')] [ROOT.GetCountry.GetNameNoFlag] has Mass Conscription. \n• [SCOPE.GetRootScope.GetCountry.GetCustom('alexander_ii_autocracy_checkbox')] [ROOT.GetCountry.GetNameNoFlag] maintains Autocracy."

