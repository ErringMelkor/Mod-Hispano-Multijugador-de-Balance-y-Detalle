age_of_nicholas_i.2.t: "Kiselyov answers to the Imperial Court."
age_of_nicholas_i.2.d: "Tsar Nicholas I has summoned the veteran Pavel Kiselyov to lead the Ministry of Statal Property under the Imperial Council. Of reformist affinities, Kiselyov wishes to transform the State towards a modern apparatus, as well as reforming land tenancy, and is a firm advocate of the peasantry."
age_of_nicholas_i.2.f: ""
age_of_nicholas_i.2.a: "Grant him the ministership; we can't risk alienating the aristocracy."
age_of_nicholas_i.2.b: "Give him free reign to his reformist will."

modifier_curtailed_landowners: "Curtailed aristocracy"
modifier_appeased_peasantry: "Appeased peasantry"

age_of_nicholas_i.3.t: "An artistic dilemma"
age_of_nicholas_i.3.d: "Nicholas I is a great promoter of Russian art and science: under his tutelage, figures such as Alexander Pushkin, Nikolai Gogol or Ivan Turgenev have florished; arts like ballet or classical music have developed; thoughts like Slavophilia are grown.\n  Now, we have the opportunity to finance a second generation of thinkers, to bring to Russia new ideas or keep growing our own."
age_of_nicholas_i.3.f: ""
age_of_nicholas_i.3.a: "Let's finance new researchs."
age_of_nicholas_i.3.b: "Lets finance the european thought."
age_of_nicholas_i.3.c: "Let's finance both possibilities."
age_of_nicholas_i.3.e: "The sword is always mightier than the pen."

modifier_russian_academics_abroad: "Russian academics, European ideas"
modifier_russian_academic_expenses: "Extraordinary academic expenses"
modifier_russian_academic_expenses_big: "Huge extraordinary academic expenses"

age_of_nicholas_i.4.t: "Finance the Kiselyov Schools"
age_of_nicholas_i.4.d: "Even though Zar Nicholas I  would rather abolish serfdom, he is concious that, against the aristocratic elements of Russia, it’s simply not a realist proposal. Kiselyov, on the other hand, is a man of peculiar ideas: if we can’t free this generation, let us give wings to their children, so that they may free themselves in the future. \n  These ideas are divisive, specially amongst the Church, who deeply believe that the peasantry shouldn’t be educated, but also from the aristocracy, that see in social mobility the engine for the abolition of serfdom. \n From the Imperial administration, financing primary schools it’s feasible without agitating the reactionary nest. Waiting for the correct opportunity, however (Labor Movement), could mean we get to introduce key legislation while implementing the schoools."
age_of_nicholas_i.4.f: ""
age_of_nicholas_i.4.a: "Make token efforts to the Kiselyov Schools"
age_of_nicholas_i.4.b: "Let's give Kiselyov extra funding for the schools."
age_of_nicholas_i.4.c: "Institute a radical programme of schooling"

